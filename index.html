<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כרטיסיות שפת סימנים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#dde8f8;--cw:200px;--ch:255px;--front:#fff;--back:#1b2a4a;--acc:#2563eb;--grn:#10b981;--bdr:#c5d3ec;--sh:0 6px 24px rgba(27,42,74,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:"Heebo",sans-serif;min-height:100vh;padding:24px 12px 60px;
  background-image:radial-gradient(circle at 15% 25%,#bfdbfe44 0%,transparent 45%),
                   radial-gradient(circle at 85% 75%,#a7f3d044 0%,transparent 45%)}
header{text-align:center;margin-bottom:20px}
header h1{font-size:1.9rem;font-weight:900;color:#1b2a4a}
header h1 span{color:var(--acc)}
header p{color:#6b7a99;font-size:.85rem;margin-top:4px}

.stats{display:flex;justify-content:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:white;border-radius:12px;padding:9px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
.sn{font-size:1.5rem;font-weight:900;color:var(--acc);line-height:1}
.sl{font-size:.68rem;color:#888;margin-top:2px}
.sng{color:var(--grn)}

.tabs{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.tb{background:white;border:2px solid var(--bdr);color:#6b7a99;border-radius:50px;padding:5px 15px;
  font-family:"Heebo",sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;transition:all .2s}
.tb.active,.tb:hover{background:var(--acc);border-color:var(--acc);color:white}

.grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:1100px;margin:0 auto}

/* card */
.cw{width:var(--cw);height:var(--ch);perspective:900px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.45,.05,.55,.95);border-radius:16px}
.cw.flipped .card{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;overflow:hidden;box-shadow:var(--sh)}

.front{background:var(--front);border:2px solid var(--bdr);display:flex;flex-direction:column}
.ia{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 10px 5px;background:#f4f8ff;overflow:hidden}
.ia img{max-width:100%;max-height:170px;object-fit:contain;border-radius:8px;
  transition:transform .3s;user-select:none;-webkit-user-drag:none}
.cw:hover .ia img{transform:scale(1.05)}
.cf{padding:7px 11px;display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid #edf0f8}
.ct{background:#eff6ff;color:var(--acc);font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:50px}
.fh{color:#c5cfe8;font-size:.65rem}

.back{background:var(--back);transform:rotateY(180deg);display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;padding:20px 14px 16px}
.wh{font-size:2rem;font-weight:900;color:white;text-align:center;line-height:1.15}
.wen{font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
.lb{background:transparent;border:2px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);
  border-radius:50px;padding:6px 0;font-family:"Heebo",sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .2s;width:100%}
.lb:hover,.lb.done{background:var(--grn);border-color:var(--grn);color:white}

.prog{max-width:440px;margin:28px auto 0;text-align:center}
.pl{font-size:.82rem;color:#6b7a99;margin-bottom:7px}
.pb{height:9px;background:#c5d3ec;border-radius:50px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));
  border-radius:50px;transition:width .4s}
.brow{display:flex;justify-content:center;gap:9px;margin-top:14px;flex-wrap:wrap}
.ab{background:white;border:2px solid var(--bdr);color:#1b2a4a;border-radius:50px;padding:7px 18px;
  font-family:"Heebo",sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;transition:all .2s}
.ab:hover{border-color:var(--acc);color:var(--acc)}
.ab.p{background:var(--acc);border-color:var(--acc);color:white}
.ab.p:hover{background:#1d4ed8}
.credit{text-align:center;color:#9aabcc;font-size:.68rem;margin-top:20px}

@media(max-width:580px){
  :root{--cw:145px;--ch:195px}
  header h1{font-size:1.5rem}
  .wh{font-size:1.55rem}
  .ia img{max-height:118px}
}
</style>
</head>
<body>
<header>
  <h1>כרטיסיות <span>שפת סימנים</span></h1>
  <p>לחץ על הכרטיסייה לגלות את המשמעות בעברית</p>
</header>

<div class="stats">
  <div class="stat"><div class="sn" id="s-total">20</div><div class="sl">סה"כ</div></div>
  <div class="stat"><div class="sn" id="s-seen">0</div><div class="sl">נצפו</div></div>
  <div class="stat"><div class="sn sng" id="s-learned">0</div><div class="sl">ידועים ✓</div></div>
</div>

<div class="tabs" id="tabs">
  <button class="tb active" data-cat="all">הכל</button>
</div>

<div class="grid" id="grid"></div>

<div class="prog">
  <div class="pl" id="pl">0 / 20 נצפו</div>
  <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
  <div class="brow">
    <button class="ab" id="br">אפס צפיות</button>
    <button class="ab" id="bl">אפס "ידוע"</button>
    <button class="ab p" id="bs">ערבב 🔀</button>
  </div>
</div>

let order=CARDS.map((_,i)=>i),seen=new Set(),learned=new Set(),cat="all";

function buildTabs(){
  const t=document.getElementById("tabs");
  [...new Set(CARDS.map(c=>c.cat))].forEach(c=>{
    const b=document.createElement("button");
    b.className="tb";b.dataset.cat=c;b.textContent=c;
    b.onclick=()=>{document.querySelectorAll(".tb").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");cat=c;render()};
    t.appendChild(b);
  });
  t.querySelector("[data-cat=all]").onclick=()=>{
    document.querySelectorAll(".tb").forEach(x=>x.classList.remove("active"));
    t.querySelector("[data-cat=all]").classList.add("active");cat="all";render()};
}

function filtered(){return order.map(i=>{return{...CARDS[i],i}}).filter(d=>cat==="all"||d.cat===cat)}

function render(){
  const g=document.getElementById("grid");g.innerHTML="";
  const list=filtered();
  list.forEach((d,n)=>{
    const w=document.createElement("div");
    w.className="cw"+(seen.has(d.i)?" flipped":"");
    w.innerHTML=`
      <div class="card">
        <div class="face front">
          <div class="ia"><img src="${d.img}" alt="${d.word}"></div>
          <div class="cf"><span class="ct">${d.cat}</span><span class="fh">↩ הפוך</span></div>
        </div>
        <div class="face back">
          <div class="wen">${d.en}</div>
          <div class="wh">${d.word}</div>
          <button class="lb${learned.has(d.i)?" done":""}">
            ${learned.has(d.i)?"✓ ידוע!":"סמן כידוע"}</button>
        </div>
      </div>`;
    w.addEventListener("click",e=>{
      if(e.target.closest(".lb"))return;
      if(!w.classList.contains("flipped"))seen.add(d.i);
      w.classList.toggle("flipped");upd();
    });
    w.querySelector(".lb").addEventListener("click",e=>{
      e.stopPropagation();const b=e.currentTarget;
      if(learned.has(d.i)){learned.delete(d.i);b.classList.remove("done");b.textContent="סמן כידוע"}
      else{learned.add(d.i);b.classList.add("done");b.textContent="✓ ידוע!"}
      upd();
    });
    g.appendChild(w);
  });
  upd();
}

function upd(){
  const list=filtered();
  const s=list.filter(d=>seen.has(d.i)).length;
  document.getElementById("s-total").textContent=CARDS.length;
  document.getElementById("s-seen").textContent=seen.size;
  document.getElementById("s-learned").textContent=learned.size;
  document.getElementById("pl").textContent=s+" / "+list.length+" נצפו";
  document.getElementById("pf").style.width=(list.length?Math.round(s/list.length*100):0)+"%";
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}}

document.getElementById("br").onclick=()=>{seen.clear();render()};
document.getElementById("bl").onclick=()=>{learned.clear();render()};
document.getElementById("bs").onclick=()=>{shuffle(order);render()};

buildTabs();render();
</script>
